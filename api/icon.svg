  <!-- Cross hairs -->
  <line x1="256" y1="56" x2="256" y2="140" stroke="#ffffff" stroke-width="18" stroke-linecap="round"/>
  <line x1="256" y1="372" x2="256" y2="456" stroke="#ffffff" stroke-width="18" stroke-linecap="round"/>
  <line x1="56" y1="256" x2="140" y2="256" stroke="#ffffff" stroke-width="18" stroke-linecap="round"/>
  <line x1="372" y1="256" x2="456" y2="256" stroke="#ffffff" stroke-width="18" stroke-linecap="round"/>
</svg>
