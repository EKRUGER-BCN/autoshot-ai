<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#0a0a0a"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" stroke="#ffffff" stroke-width="18" fill="none"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="100" stroke="#ffffff" stroke-width="12" fill="none"/>
  <!-- Center dot -->
