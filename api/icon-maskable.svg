<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full bleed background (maskable — no rounded corners) -->
  <rect width="512" height="512" fill="#0a0a0a"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="160" stroke="#ffffff" stroke-width="16" fill="none"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="88" stroke="#ffffff" stroke-width="11" fill="none"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="30" fill="#cc0000"/>
  <!-- Cross hairs -->
  <line x1="256" y1="76" x2="256" y2="152" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
  <line x1="256" y1="360" x2="256" y2="436" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
  <line x1="76" y1="256" x2="152" y2="256" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
  <line x1="360" y1="256" x2="436" y2="256" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
</svg>
